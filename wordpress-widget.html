<!--
  DALOR AI Stylist Chat — embeddable widget for dalor.co.il (WordPress)
  ------------------------------------------------------------------
  Talks to the existing dalor_app backend (dalor-app.onrender.com).
  Paste this WHOLE block into a "footer" code snippet on the WordPress
  site (e.g. the "Insert Headers and Footers" plugin, footer section).
  No other setup needed — it builds its own button + chat window and
  attaches them to the page automatically.
-->
<style>
  #dwc-btn{position:fixed;bottom:20px;left:20px;z-index:999998;width:56px;height:56px;border-radius:50%;background:#C9A84C;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(201,168,76,.5);}
  #dwc-btn svg{width:26px;height:26px;}
  #dwc-win{position:fixed;bottom:88px;left:16px;right:16px;max-width:400px;z-index:999999;background:#141414;border:1px solid #2a2a2a;border-radius:20px;box-shadow:0 8px 40px rgba(0,0,0,.6);display:none;flex-direction:column;max-height:70vh;font-family:'DM Sans',Arial,sans-serif;direction:rtl;}
  #dwc-win.on{display:flex;}
  .dwc-head{padding:14px 16px;border-bottom:1px solid #2a2a2a;flex-shrink:0;}
  .dwc-head-title{font-size:15px;color:#C9A84C;font-weight:700;letter-spacing:.5px;}
  .dwc-head-sub{font-size:10px;color:#999;margin-top:1px;}
  .dwc-x{position:absolute;top:12px;left:12px;background:none;border:none;color:#999;font-size:20px;cursor:pointer;padding:2px 6px;}
  .dwc-msgs{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:10px;min-height:200px;}
  .dwc-msg{max-width:85%;padding:10px 13px;border-radius:16px;font-size:13px;line-height:1.55;white-space:pre-wrap;}
  .dwc-msg.bot{background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.2);color:#F0EBE0;align-self:flex-start;border-bottom-right-radius:4px;}
  .dwc-msg.user{background:#C9A84C;color:#000;align-self:flex-end;font-weight:500;border-bottom-left-radius:4px;}
  .dwc-chips{display:flex;flex-wrap:wrap;gap:6px;padding:4px 14px 10px;flex-shrink:0;}
  .dwc-chip{padding:6px 12px;background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.35);border-radius:20px;font-size:11px;color:#C9A84C;cursor:pointer;white-space:nowrap;}
  .dwc-input-row{display:flex;gap:8px;padding:10px 12px 12px;border-top:1px solid #2a2a2a;flex-shrink:0;}
  .dwc-input{flex:1;background:#1e1e1e;border:1px solid #2a2a2a;border-radius:20px;padding:9px 14px;color:#fff;font-size:13px;outline:none;font-family:inherit;}
  .dwc-send{background:#C9A84C;border:none;border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
  .dwc-typing{display:flex;gap:5px;align-items:center;padding:11px 14px;background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.2);border-radius:16px;align-self:flex-start;}
  .dwc-typing span{width:6px;height:6px;border-radius:50%;background:#C9A84C;opacity:.4;animation:dwc-tdot 1.4s ease-in-out infinite;}
  .dwc-typing span:nth-child(2){animation-delay:.2s}.dwc-typing span:nth-child(3){animation-delay:.4s}
  @keyframes dwc-tdot{0%,100%{opacity:.4;transform:scale(.7)}50%{opacity:1;transform:scale(1)}}
  .dwc-prod-row{display:flex;align-items:flex-start;flex-shrink:0;gap:8px;overflow-x:auto;padding:2px 2px 4px;}
  .dwc-prod-card{flex:0 0 92px;background:#1e1e1e;border:1px solid #2a2a2a;border-radius:10px;cursor:pointer;text-decoration:none;display:block;}
  .dwc-prod-img{width:92px;height:92px;background:#1a1a1a;border-radius:10px 10px 0 0;overflow:hidden;}
  .dwc-prod-img img{width:100%;height:100%;object-fit:cover;display:block;}
  .dwc-prod-name{font-size:10px;padding:5px 6px 0;line-height:1.3;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .dwc-prod-price{font-size:11px;font-weight:600;color:#C9A84C;padding:2px 6px 6px;}
</style>

<button id="dwc-btn" aria-label="עוזר סטייל DALOR">
  <svg viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
</button>

<div id="dwc-win" role="dialog" aria-label="עוזר סטייל DALOR">
  <div class="dwc-head" style="position:relative;">
    <div class="dwc-head-title">✨ הסטייליסט האישי של DALOR</div>
    <div class="dwc-head-sub">בונה לך לוק מושלם — שלב אחרי שלב</div>
    <button class="dwc-x" id="dwc-close" aria-label="סגור">✕</button>
  </div>
  <div class="dwc-msgs" id="dwc-msgs"></div>
  <div class="dwc-chips" id="dwc-chips"></div>
  <div class="dwc-input-row">
    <button class="dwc-send" id="dwc-send" aria-label="שלח">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="#000" stroke-width="2"><path d="M22 2 11 13"/><path d="M22 2 15 22l-4-9-9-4 20-7z"/></svg>
    </button>
    <input class="dwc-input" id="dwc-input" type="text" placeholder="שאל אותי הכל...">
  </div>
</div>

<script>
(function(){
  var API_BASE = 'https://dalor-app.onrender.com';
  var history = [];
  var open = false;
  var products = null; // cached product list, fetched lazily

  var btn = document.getElementById('dwc-btn');
  var win = document.getElementById('dwc-win');
  var msgsEl = document.getElementById('dwc-msgs');
  var chipsEl = document.getElementById('dwc-chips');
  var inputEl = document.getElementById('dwc-input');

  function h(s){
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function getPrice(p){
    var sale = p.sale_price ? parseFloat(p.sale_price) : null;
    var base = parseFloat(p.price);
    return (sale && sale < base) ? sale : base;
  }

  function appendMsg(type, text){
    var d = document.createElement('div');
    d.className = 'dwc-msg ' + type;
    d.innerHTML = h(text).replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');
    msgsEl.appendChild(d);
    msgsEl.scrollTop = msgsEl.scrollHeight;
  }

  function showTyping(){
    var d = document.createElement('div');
    d.id = 'dwc-typing';
    d.className = 'dwc-typing';
    d.innerHTML = '<span></span><span></span><span></span>';
    msgsEl.appendChild(d);
    msgsEl.scrollTop = msgsEl.scrollHeight;
  }
  function hideTyping(){
    var t = document.getElementById('dwc-typing');
    if (t) t.remove();
  }

  function ensureProducts(cb){
    if (products) return cb();
    fetch(API_BASE + '/api/products')
      .then(function(r){ return r.json(); })
      .then(function(data){ products = Array.isArray(data) ? data : []; cb(); })
      .catch(function(){ products = []; cb(); });
  }

  function renderProductCards(ids){
    ensureProducts(function(){
      var found = ids.map(function(id){
        return products.filter(function(p){ return String(p.id) === String(id); })[0];
      }).filter(Boolean);
      if (!found.length) return;
      var row = document.createElement('div');
      row.className = 'dwc-prod-row';
      row.innerHTML = found.map(function(p){
        var img = p.image_url || '';
        var price = getPrice(p);
        var url = API_BASE + '/?product=' + encodeURIComponent(p.id);
        return '<a class="dwc-prod-card" href="' + h(url) + '" target="_blank" rel="noopener">' +
          '<div class="dwc-prod-img">' + (img ? '<img src="' + h(img) + '" alt="' + h(p.name) + '" loading="lazy"/>' : '') + '</div>' +
          '<div class="dwc-prod-name">' + h(p.name) + '</div>' +
          '<div class="dwc-prod-price">₪' + price + '</div>' +
        '</a>';
      }).join('');
      msgsEl.appendChild(row);
      msgsEl.scrollTop = msgsEl.scrollHeight;
    });
  }

  function setChips(opts){
    chipsEl.innerHTML = opts.map(function(o){
      return '<button class="dwc-chip">' + h(o) + '</button>';
    }).join('');
    var chips = chipsEl.querySelectorAll('.dwc-chip');
    for (var i = 0; i < chips.length; i++) {
      chips[i].addEventListener('click', (function(text, el){
        return function(){
          el.style.opacity = '.4';
          el.style.pointerEvents = 'none';
          sendMessage(text);
        };
      })(opts[i], chips[i]));
    }
  }

  function callChatAPI(){
    showTyping();
    fetch(API_BASE + '/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: history })
    })
      .then(function(r){ return r.json(); })
      .then(function(d){
        hideTyping();
        var reply = d.reply || '...';
        history.push({ role: 'assistant', content: reply });
        appendMsg('bot', reply);
        if (d.productIds && d.productIds.length) renderProductCards(d.productIds);
      })
      .catch(function(){
        hideTyping();
        appendMsg('bot', 'אופס, בעיה קטנה 😔 נסה שוב');
      });
  }

  function sendMessage(text){
    if (!text) return;
    appendMsg('user', text);
    history.push({ role: 'user', content: text });
    callChatAPI();
  }

  function toggleChat(){
    open = !open;
    win.classList.toggle('on', open);
    if (open && history.length === 0) {
      appendMsg('bot', 'היי! 👋 אני הסטייליסט האישי של DALOR. איך אפשר לעזור?');
      setChips(['🔍 מצא לי פריט', '✨ תלביש אותי']);
    }
  }

  btn.addEventListener('click', toggleChat);
  document.getElementById('dwc-close').addEventListener('click', toggleChat);
  document.getElementById('dwc-send').addEventListener('click', function(){
    var t = inputEl.value.trim();
    if (!t) return;
    inputEl.value = '';
    sendMessage(t);
  });
  inputEl.addEventListener('keydown', function(e){
    if (e.key === 'Enter') document.getElementById('dwc-send').click();
  });
})();
</script>
